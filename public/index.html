<!DOCTYPE html>
<html lang="en">
  <head>


    <!-- ✅ ADVANCED SEO ADDITIONS (NO CHANGES TO YOUR EXISTING CODE) -->

<!-- GEO (Location SEO) -->
<meta name="geo.region" content="IN" />
<meta name="geo.placename" content="India" />

<!-- Google Verification (optional - only if needed) -->
<!-- <meta name="google-site-verification" content="YOUR_CODE_HERE" /> -->

<!-- Open Graph Enhancement -->
<meta property="og:image:alt" content="Kognivex - AI, SaaS & Web Development Company" />

<!-- Twitter Enhancement -->
<meta name="twitter:site" content="@kognivex" />

<!-- Performance -->
<link rel="dns-prefetch" href="//fonts.googleapis.com" />
<link rel="dns-prefetch" href="//fonts.gstatic.com" />

<!-- Theme Enhancement -->
<meta name="color-scheme" content="light dark" />

<!-- Structured Data (VERY IMPORTANT) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Kognivex",
  "url": "https://kognivex.in/",
  "logo": "https://kognivex.in/Logo.jpeg",
  "description": "Kognivex builds scalable web applications, SaaS platforms, and enterprise software solutions.",
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "IN"
  },
  "sameAs": [
    "https://www.linkedin.com/",
    "https://twitter.com/"
  ]
}
</script>

<!-- Website Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "url": "https://kognivex.in/",
  "name": "Kognivex",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://kognivex.in/?s={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>


    
    <!-- BASIC -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1b2a" />


    
    <!-- SEO -->
    <title>Kognivex | Web Development, SaaS & IT Solutions Company</title>

    <meta
      name="description"
      content="Kognivex builds scalable web applications, SaaS platforms, and enterprise software solutions for startups and businesses."
    />

    <meta
      name="keywords"
      content="web development company, SaaS development, software development, IT services, startup development"
    />

    <meta name="author" content="Kognivex" />

    <!-- CANONICAL -->
    <link rel="canonical" href="https://kognivex.in/" />

    <!-- ROBOTS -->
    <meta name="robots" content="index, follow" />

    <!-- OPEN GRAPH -->
<meta property="og:type" content="website" />
<meta property="og:title" content="Kognivex - IT Solutions Company" />
<meta property="og:description" content="We build scalable web apps, SaaS platforms, and enterprise solutions." />
<meta property="og:url" content="https://kognivex.in/" />
<meta property="og:image" content="https://kognivex.in/Logo.jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:site_name" content="Kognivex" />
<meta property="og:locale" content="en_US" />

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Kognivex - IT Solutions" />
<meta name="twitter:description" content="Scalable web, SaaS, and enterprise solutions." />
<meta name="twitter:image" content="https://kognivex.in/Logo.jpeg" />

    <!-- ✅ FAVICON SETUP -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="52x52" href="/favicon-52x52.png" />
    <link rel="icon" type="image/png" sizes="26x26" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
